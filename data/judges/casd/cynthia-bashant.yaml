bio_notes: >-
  Chief Judge of the U.S. District Court for the Southern District of
  California. Confirmed to the federal bench by the Senate on April 30,
  2014, by a 94–0 vote, on nomination from President Barack Obama. Prior
  service includes fourteen years on the San Diego County Superior Court
  and eleven years as an Assistant U.S. Attorney in the Southern District
  of California.
