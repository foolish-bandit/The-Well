bio_notes: >-
  United States District Judge for the Southern District of California.
  Confirmed by the Senate on December 17, 2021 by a 47–24 vote on
  nomination from President Joe Biden, becoming the first Asian
  American woman to serve as an Article III judge in this district.
  Prior service includes the San Diego County Superior Court and a
  decade in the consumer-protection section of the California
  Attorney General's Office.
