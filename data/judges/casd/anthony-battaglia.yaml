bio_notes: >-
  Senior United States District Judge for the Southern District of
  California. Received his commission as a district judge on March 9,
  2011 on nomination from President Barack Obama. Assumed senior
  status on March 31, 2021. Served as a U.S. Magistrate Judge in the
  same district from 1993 to 2011 before elevation.
